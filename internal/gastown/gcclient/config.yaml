# oapi-codegen config for the Gas City Supervisor API client.
# Regenerate with `make gc-client` after bumping openapi.json to a new
# pinned gascity tag. The spec is OpenAPI 3.1 (oapi-codegen >= v2.4 required).
#
# Generation is scoped to the read endpoints mg needs today; widen
# include-operation-ids as later phases add mutations (sling, mail, convoy…).
package: gcclient
output: client_gen.go
generate:
  models: true
  client: true
output-options:
  include-operation-ids:
    # Phase 2 — read path / roster
    - get-v0-cities
    - get-v0-city-by-city-name-agents
    - get-v0-city-by-city-name-status
    # Phase 3 — mail + formulas
    - get-v0-city-by-city-name-formulas
    - get-v0-city-by-city-name-mail
    - get-v0-city-by-city-name-mail-by-id
    - reply-mail
    - send-mail
    - post-v0-city-by-city-name-mail-by-id-archive
    - post-v0-city-by-city-name-mail-by-id-read
    # Nudge + decommission — resolve agent -> session, then submit/kill
    - get-v0-city-by-city-name-sessions
    - submit-session
    - post-v0-city-by-city-name-session-by-id-kill
    # Convoys (modeled as beads)
    - get-v0-city-by-city-name-convoys
    - get-v0-city-by-city-name-convoy-by-id
    - create-convoy
    - post-v0-city-by-city-name-convoy-by-id-close
    # Sling
    - post-v0-city-by-city-name-sling
